# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "d502b734f2ad37cf0eb3b63420b5d516"
name = "Vinci Shoppable Videos"
application_url = "https://carrousel-pu4u.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/app/subscriptions_update"

  # Mandatory GDPR / privacy webhooks (use compliance_topics — not the same as topics = customers/...)
  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "/webhooks/compliance"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products,read_orders,read_themes,write_app_proxy,read_metaobjects,write_metaobjects,read_metaobject_definitions,write_metaobject_definitions"

[app_proxy]
url = "/proxy/carrousel"
prefix = "apps"
subpath = "carrousel"

[auth]
redirect_urls = [ "https://carrousel-pu4u.onrender.com/auth/callback" ]

# App-owned definition (type $app:vinci_playlist). Required for the theme editor
# "Playlist" metaobject picker on app blocks — GraphQL-only definitions often do not register for that UI.
[metaobjects.app.vinci_playlist]
name = "Vinci Shoppable Videos Playlists"
description = "Playlist entries synced from the Vinci Shoppable Videos app for theme blocks."
display_name_field = "playlist_name"
access.admin = "merchant_read_write"
access.storefront = "public_read"

# Order: name first so Content > Metaobjects lists entries by human-readable title when combined with display_name_field.
[metaobjects.app.vinci_playlist.fields.playlist_name]
name = "Playlist Name"
type = "single_line_text_field"
required = true

[metaobjects.app.vinci_playlist.fields.playlist_id]
name = "Playlist ID"
type = "single_line_text_field"
required = true
